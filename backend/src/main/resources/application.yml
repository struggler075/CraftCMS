server:
  port: 8080
  address: 0.0.0.0

spring:
  application:
    name: craftcms-backend

  # Default profile when nothing is passed (e.g. running from IDE / mvn spring-boot:run).
  # Production installs override via SPRING_PROFILES_ACTIVE=prod.
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

bridge:
  template-jar: ../BridgePlugin/target/BridgePlugin.jar

app:
  jwt:
    secret: 7638792F423F4528482B4D6251655468576D5A7134743777397A24432646294A
    expiration: 86400000  # 24 hours in ms

  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000

  upload:
    path: ./uploads

  modules:
    trademc: true

  github:
    repo: struggler075/CraftCMS

  install-dir: /opt/craftcms

feign:
  client:
    config:
      mc-server-status:
        connect-timeout: 5000
        read-timeout: 10000
        url: https://api.mcsrvstat.us

logging:
  level:
    com.craftcms: INFO
    com.craftcms.ping: INFO
    org.springframework.security: WARN
