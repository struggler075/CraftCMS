# Local development profile — file-backed H2 with the web console enabled.
spring:
  datasource:
    url: jdbc:h2:file:./data/craftcms;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

logging:
  level:
    com.craftcms: DEBUG
    com.craftcms.ping: DEBUG
    org.springframework.security: INFO
