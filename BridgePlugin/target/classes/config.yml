# CraftCMS Bridge Plugin configuration

# URL бэкенда определяется автоматически при скачивании через Админка → Серверный Плагин.
# Для ручной/dev сборки укажи вручную:
# base-url: "http://localhost:8080"

# API ключ используется только если плагин собран вручную (не через Админку).
# При скачивании через Админка → Серверный Плагин ключ захардкожен в JAR автоматически.
# api-key: "change-me"

# Проверять бан при заходе на сервер
ban-check-enabled: true

# Название инвентаря корзины (отображается игроку)
cart-title: "§6Корзина покупок"

# Цвет текста в GUI (§-коды)
gui-item-color: "§f"
gui-lore-color: "§7"
