server:
  port: 8080

spring:
  application:
    name: craftcms-backend

  datasource:
    url: jdbc:h2:file:./data/craftcms;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

bridge:
  template-jar: ../BridgePlugin/target/BridgePlugin.jar

app:
  jwt:
    secret: 7638792F423F4528482B4D6251655468576D5A7134743777397A24432646294A
    expiration: 86400000  # 24 hours in ms

  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000

  upload:
    path: ./uploads

feign:
  client:
    config:
      mc-server-status:
        connect-timeout: 5000
        read-timeout: 10000
        url: https://api.mcsrvstat.us

logging:
  level:
    com.craftcms: DEBUG
    com.craftcms.ping: DEBUG
    org.springframework.security: INFO
